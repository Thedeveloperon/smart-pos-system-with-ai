services:
  - type: web
    name: smartpos-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Database__Provider
        value: Sqlite
      - key: ConnectionStrings__Sqlite
        value: Data Source=smartpos.db
      - key: JwtAuth__SecureCookie
        value: "true"
      - key: Licensing__TokenCookieSecure
        value: "true"
      - key: SMARTPOS_JWT_SECRET
        sync: false
      - key: SMARTPOS_LICENSE_SIGNING_PRIVATE_KEY_PEM
        sync: false
      - key: SMARTPOS_LICENSE_DATA_ENCRYPTION_KEY
        sync: false
      - key: Licensing__VerificationPublicKeyPem
        sync: false
      - key: Licensing__AccessSuccessPageBaseUrl
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: smartpos-pos-frontend
    runtime: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile.render
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: BACKEND_UPSTREAM
        value: https://smartpos-backend.onrender.com

  - type: web
    name: smartpos-marketing-website
    runtime: node
    rootDir: website
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: SMARTPOS_BACKEND_API_URL
        sync: false
