<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartPOS Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Lato", system-ui, -apple-system, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #f6f9fc 0%, #e8f7f2 100%);
        color: #1a2438;
      }
      main {
        width: min(560px, 92vw);
        border: 1px solid #c9d6e3;
        border-radius: 16px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 10px 30px rgba(25, 42, 70, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.5;
      }
      .hint {
        color: #415069;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>SmartPOS account and pricing pages need an internet connection for live billing and licensing status.</p>
      <p class="hint">Reconnect to continue checkout, account access, or device management actions.</p>
    </main>
  </body>
</html>
