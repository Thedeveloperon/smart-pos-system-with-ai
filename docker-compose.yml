services:
  postgres:
    image: postgres:16-alpine
    container_name: smartpos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartpos
      POSTGRES_USER: smartpos
      POSTGRES_PASSWORD: smartpos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpos -d smartpos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartpos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
